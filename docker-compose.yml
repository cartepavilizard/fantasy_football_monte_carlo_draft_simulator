services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    # The backend reaches Mongo over the compose network; only expose the
    # port for host-side tooling or local (LOCAL=true) runs, loopback-only:
    # ports:
    #   - 127.0.0.1:27017:27017
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - mongodb_data:/data/db
  nextjs-app:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL the user's browser uses to reach the backend
        - NEXT_PUBLIC_API_URL=http://localhost:8000
    container_name: nextjs-app
    restart: always
    ports:
      - 3000:3000
  fastapi-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi-backend
    restart: always
    environment:
      - LOCAL=false
      - DRAFT_YEAR=2024  # must match the Season column in your players CSV
      # Scheduled source refresh: daily off-season; tighten (e.g. 6) in
      # August. Pause on draft day via POST /rankings/schedule?enabled=false
      - RANKINGS_REFRESH_ENABLED=true
      - RANKINGS_REFRESH_INTERVAL_HOURS=24
      # Source credentials are read from .env / the host environment:
      # ESPN_S2, ESPN_SWID, ESPN_LEAGUE_IDS, YAHOO_CLIENT_ID,
      # YAHOO_CLIENT_SECRET, YAHOO_REFRESH_TOKEN, FANTASYPROS_API_KEY
      - ESPN_S2=${ESPN_S2:-}
      - ESPN_SWID=${ESPN_SWID:-}
      - ESPN_LEAGUE_IDS=${ESPN_LEAGUE_IDS:-}
      - YAHOO_CLIENT_ID=${YAHOO_CLIENT_ID:-}
      - YAHOO_CLIENT_SECRET=${YAHOO_CLIENT_SECRET:-}
      - YAHOO_REFRESH_TOKEN=${YAHOO_REFRESH_TOKEN:-}
      - FANTASYPROS_API_KEY=${FANTASYPROS_API_KEY:-}
    ports:
      - 8000:8000
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongodb_data: