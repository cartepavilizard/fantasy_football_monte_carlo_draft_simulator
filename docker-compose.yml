version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: always
    # The backend reaches Mongo over the compose network; only expose the
    # port for host-side tooling or local (LOCAL=true) runs, loopback-only:
    # ports:
    #   - 127.0.0.1:27017:27017
    volumes:
      - mongodb_data:/data/db
  nextjs-app:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextjs-app
    restart: always
    ports:
      - 3000:3000
  fastapi-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fastapi-backend
    restart: always
    environment:
      - LOCAL=false
      - DRAFT_YEAR=2024  # must match the Season column in your players CSV
    ports:
      - 8000:8000
    volumes:
      - ./backend:/app
    depends_on:
      - mongodb

volumes:
  mongodb_data: